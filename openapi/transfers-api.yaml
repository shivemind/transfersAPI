openapi: 3.0.3
info:
  title: Transfers API
  version: 1.0.0
  description: Core banking fund transfers service
servers:
  - url: https://stage-api.example.com/transfers
    description: Stage
  - url: https://api.example.com/transfers
    description: Production
paths:
  /transfers:
    get:
      operationId: listTransfers
      summary: List transfers
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, completed, failed, cancelled]
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Transfer"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createTransfer
      summary: Initiate a fund transfer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransferRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transfer"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /transfers/{transferId}:
    get:
      operationId: getTransfer
      summary: Get a transfer by ID
      parameters:
        - $ref: "#/components/parameters/TransferId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transfer"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /transfers/{transferId}/cancel:
    post:
      operationId: cancelTransfer
      summary: Cancel a pending transfer
      parameters:
        - $ref: "#/components/parameters/TransferId"
      responses:
        "200":
          description: Transfer cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transfer"
        "409":
          description: Transfer cannot be cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  parameters:
    TransferId:
      name: transferId
      in: path
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    Transfer:
      type: object
      properties:
        id:
          type: string
          format: uuid
        fromAccountId:
          type: string
        toAccountId:
          type: string
        amount:
          type: number
          format: double
        currency:
          type: string
        status:
          type: string
          enum: [pending, completed, failed, cancelled]
        reference:
          type: string
        createdAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
    TransferRequest:
      type: object
      required: [fromAccountId, toAccountId, amount, currency]
      properties:
        fromAccountId:
          type: string
        toAccountId:
          type: string
        amount:
          type: number
          format: double
        currency:
          type: string
        reference:
          type: string
    PaginationMeta:
      type: object
      properties:
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        statusCode:
          type: integer
