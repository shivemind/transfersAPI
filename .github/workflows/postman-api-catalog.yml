name: postman-api-catalog

on:
  pull_request:
    paths:
      - "openapi/**"
      - "specs/**"
      - "postman-services.json"
      - ".github/workflows/postman-api-catalog.yml"
  push:
    branches:
      - main
    paths:
      - "openapi/**"
      - "specs/**"
      - "postman-services.json"
      - ".github/workflows/postman-api-catalog.yml"
  workflow_dispatch:
    inputs:
      target_service:
        description: "Optional service_key to process"
        required: false
        type: string

concurrency:
  group: postman-api-catalog-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  actions: write
  checks: write
  pull-requests: write

env:
  MANIFEST_PATH: postman-services.json
  REPORTS_DIR: reports
  POSTMAN_INTEGRATION_BACKEND: bifrost

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.select.outputs.has_changes }}
      matrix: ${{ steps.select.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: select
        shell: bash
        run: |
          set -euo pipefail

          test -f "${MANIFEST_PATH}"

          target_service="${{ github.event_name == 'workflow_dispatch' && inputs.target_service || '' }}"
          event_name="${{ github.event_name }}"
          before_sha="${{ github.event.before }}"
          head_sha="${{ github.sha }}"
          pr_base_sha="${{ github.event.pull_request.base.sha || '' }}"
          pr_head_sha="${{ github.event.pull_request.head.sha || '' }}"

          all_services="$(jq -c '.services' "${MANIFEST_PATH}")"

          if [[ -n "${target_service}" ]]; then
            filtered="$(jq -c --arg key "${target_service}" '
              map(select(.service_key == $key))
            ' <<<"${all_services}")"
          else
            changed_files=""
            if [[ "${event_name}" == "pull_request" && -n "${pr_base_sha}" && -n "${pr_head_sha}" ]]; then
              changed_files="$(git diff --name-only "${pr_base_sha}" "${pr_head_sha}" || true)"
            elif [[ "${event_name}" == "push" && -n "${before_sha}" && "${before_sha}" != "0000000000000000000000000000000000000000" ]]; then
              changed_files="$(git diff --name-only "${before_sha}" "${head_sha}" || true)"
            fi

            if [[ -z "${changed_files}" ]]; then
              filtered="${all_services}"
            else
              changed_json="$(printf '%s\n' "${changed_files}" | jq -R -s 'split("\n") | map(select(length > 0))')"
              filtered="$(jq -c --argjson changed "${changed_json}" '
                map(
                  . as $service
                  | select($changed | any(. == $service.spec_path))
                )
              ' <<<"${all_services}")"
            fi
          fi

          count="$(jq 'length' <<<"${filtered}")"
          if [[ "${count}" -eq 0 ]]; then
            echo "has_changes=false" >> "${GITHUB_OUTPUT}"
            echo 'matrix={"include":[]}' >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "has_changes=true" >> "${GITHUB_OUTPUT}"
          echo "matrix=$(jq -c '{include: .}' <<<"${filtered}")" >> "${GITHUB_OUTPUT}"

  spechub_pipeline:
    needs: plan
    if: needs.plan.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Postman CLI
        run: |
          npm install -g postman-cli@1.33.5
          postman --version

      - name: Authenticate Postman CLI
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
        run: postman login --with-api-key "${POSTMAN_API_KEY}"

      - name: Prepare reports directory
        run: mkdir -p "${REPORTS_DIR}"

      - name: Bootstrap workspace, spec, and collections
        id: bootstrap
        uses: postman-cs/postman-bootstrap-action@v0
        with:
          project-name: ${{ matrix.service_key }}
          domain: ${{ matrix.domain }}
          domain-code: ${{ matrix.domain_code }}
          requester-email: ${{ matrix.requester_email }}
          workspace-admin-user-ids: ${{ vars.POSTMAN_WORKSPACE_ADMIN_USER_IDS }}
          spec-url: https://raw.githubusercontent.com/${{ github.repository }}/${{ github.event.pull_request.head.sha || github.sha }}/${{ matrix.spec_path }}
          workspace-id: ${{ matrix.workspace_id }}
          spec-id: ${{ matrix.spec_id }}
          baseline-collection-id: ${{ matrix.baseline_collection_id }}
          smoke-collection-id: ${{ matrix.smoke_collection_id }}
          contract-collection-id: ${{ matrix.contract_collection_id }}
          collection-sync-mode: reuse
          integration-backend: ${{ env.POSTMAN_INTEGRATION_BACKEND }}
          postman-api-key: ${{ secrets.POSTMAN_API_KEY }}

      - name: Lint OpenAPI spec
        shell: bash
        run: |
          set -o pipefail
          postman spec lint "${{ matrix.spec_path }}" \
            --fail-severity ERROR \
            --output JSON \
            2>&1 | tee "${REPORTS_DIR}/${{ matrix.service_key }}-lint.txt"

      - name: Repo sync and publish Spec Hub-backed assets to API catalog
        id: repo_sync
        uses: postman-cs/postman-repo-sync-action@v0
        with:
          project-name: ${{ matrix.service_key }}
          workspace-id: ${{ steps.bootstrap.outputs.workspace-id }}
          spec-id: ${{ steps.bootstrap.outputs.spec-id }}
          baseline-collection-id: ${{ steps.bootstrap.outputs.baseline-collection-id }}
          smoke-collection-id: ${{ steps.bootstrap.outputs.smoke-collection-id }}
          contract-collection-id: ${{ steps.bootstrap.outputs.contract-collection-id }}
          spec-path: ${{ matrix.spec_path }}
          environments-json: ${{ toJSON(matrix.environments) }}
          environment-uids-json: ${{ toJSON(matrix.environment_uids) }}
          system-env-map-json: ${{ toJSON(matrix.system_env_map) }}
          env-runtime-urls-json: ${{ toJSON(matrix.runtime_urls) }}
          generate-ci-workflow: false
          integration-backend: ${{ env.POSTMAN_INTEGRATION_BACKEND }}
          postman-api-key: ${{ secrets.POSTMAN_API_KEY }}
          postman-access-token: ${{ secrets.POSTMAN_ACCESS_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          gh-fallback-token: ${{ secrets.GH_FALLBACK_TOKEN }}

      - name: Resolve CI reporting environment and target URL
        id: ci_env
        shell: bash
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
          ENVIRONMENT_UIDS_JSON: ${{ steps.repo_sync.outputs.environment-uids-json != '' && steps.repo_sync.outputs.environment-uids-json || toJSON(matrix.environment_uids) }}
          ENVIRONMENTS_JSON: ${{ toJSON(matrix.environments) }}
          SYSTEM_ENV_MAP_JSON: ${{ toJSON(matrix.system_env_map) }}
          RUNTIME_URLS_JSON: ${{ toJSON(matrix.runtime_urls) }}
          SMOKE_BASE_URL: ${{ matrix.smoke_base_url }}
          BASELINE_COLLECTION_ID: ${{ steps.bootstrap.outputs.baseline-collection-id }}
          FALLBACK_BASELINE_COLLECTION_ID: ${{ matrix.baseline_collection_id }}
        run: |
          set -euo pipefail

          is_placeholder_url() {
            local url="${1:-}"
            [[ -z "${url}" ]] && return 0
            [[ "${url}" == *"example.com"* ]] && return 0
            [[ "${url}" == *"localhost"* ]] && return 0
            [[ "${url}" == *"127.0.0.1"* ]] && return 0
            [[ "${url}" == *".svc.cluster.local"* ]] && return 0
            return 1
          }

          preferred_env="$(jq -r 'keys[0] // empty' <<<"${SYSTEM_ENV_MAP_JSON}")"
          if [[ -z "${preferred_env}" ]]; then
            preferred_env="$(jq -r '.[0] // empty' <<<"${ENVIRONMENTS_JSON}")"
          fi

          if [[ -z "${preferred_env}" ]]; then
            echo "No Postman environments configured for CI reporting." >&2
            exit 1
          fi

          environment_id="$(jq -r --arg key "${preferred_env}" '.[$key] // empty' <<<"${ENVIRONMENT_UIDS_JSON}")"
          if [[ -z "${environment_id}" ]]; then
            echo "Missing environment UID for ${preferred_env}." >&2
            exit 1
          fi

          base_url="$(jq -r --arg key "${preferred_env}" '.[$key] // empty' <<<"${RUNTIME_URLS_JSON}")"
          if is_placeholder_url "${base_url}" && ! is_placeholder_url "${SMOKE_BASE_URL}"; then
            base_url="${SMOKE_BASE_URL}"
          fi

          if is_placeholder_url "${base_url}"; then
            collection_id="${BASELINE_COLLECTION_ID:-}"
            if [[ -z "${collection_id}" ]]; then
              collection_id="${FALLBACK_BASELINE_COLLECTION_ID:-}"
            fi

            if [[ -z "${collection_id}" ]]; then
              echo "Unable to resolve a baseline collection ID for mock discovery." >&2
              exit 1
            fi

            mocks_response="$(curl --fail-with-body -sS -H "X-Api-Key: ${POSTMAN_API_KEY}" "https://api.getpostman.com/mocks")"
            base_url="$(jq -r --arg collection_uid "${collection_id}" '
              .mocks
              | map(select(.collection == $collection_uid and ((.deactivated // false) | not)))
              | first
              | .mockUrl // empty
            ' <<<"${mocks_response}")"
          fi

          if is_placeholder_url "${base_url}"; then
            echo "Unable to resolve a reachable baseUrl for ${preferred_env}." >&2
            exit 1
          fi

          echo "environment-name=${preferred_env}" >> "${GITHUB_OUTPUT}"
          echo "environment-id=${environment_id}" >> "${GITHUB_OUTPUT}"
          echo "base-url=${base_url}" >> "${GITHUB_OUTPUT}"

      - name: Sync Postman environment baseUrl for reporting
        shell: bash
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
          ENVIRONMENT_ID: ${{ steps.ci_env.outputs.environment-id }}
          BASE_URL: ${{ steps.ci_env.outputs.base-url }}
        run: |
          set -euo pipefail

          environment_response="$(
            curl --fail-with-body -sS \
              -H "X-Api-Key: ${POSTMAN_API_KEY}" \
              "https://api.getpostman.com/environments/${ENVIRONMENT_ID}"
          )"

          updated_environment="$(
            jq --arg base_url "${BASE_URL}" '
              .environment.values = (
                (.environment.values // [])
                | if any(.[]; .key == "baseUrl") then
                    map(
                      if .key == "baseUrl" then
                        .value = $base_url
                      else
                        .
                      end
                    )
                  else
                    . + [{
                      key: "baseUrl",
                      value: $base_url,
                      type: "default",
                      enabled: true
                    }]
                  end
              )
            ' <<<"${environment_response}"
          )"

          curl --fail-with-body -sS \
            -X PUT \
            -H "X-Api-Key: ${POSTMAN_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "${updated_environment}" \
            "https://api.getpostman.com/environments/${ENVIRONMENT_ID}" \
            > /dev/null

      - name: Run smoke tests
        continue-on-error: true
        shell: bash
        env:
          POSTMAN_CI_INTEGRATION_ID: ${{ vars.POSTMAN_CI_INTEGRATION_ID }}
        run: |
          set -euo pipefail
          collection_id="${{ matrix.smoke_collection_id }}"
          if [[ -z "${collection_id}" ]]; then
            collection_id="${{ steps.bootstrap.outputs.smoke-collection-id }}"
          fi

          run_args=(
            collection run "${collection_id}"
            -e "${{ steps.ci_env.outputs.environment-id }}"
            --env-var "baseUrl=${{ steps.ci_env.outputs.base-url }}"
            --env-var "apiVersion=${{ matrix.version }}"
            --bail failure
            --reporters cli,junit,json
            --reporter-junit-export "${REPORTS_DIR}/${{ matrix.service_key }}-smoke.junit.xml"
            --reporter-json-export "${REPORTS_DIR}/${{ matrix.service_key }}-smoke.json"
          )

          if [[ -n "${POSTMAN_CI_INTEGRATION_ID:-}" ]]; then
            run_args+=(--integration-id "${POSTMAN_CI_INTEGRATION_ID}")
          else
            echo "POSTMAN_CI_INTEGRATION_ID is not set; Postman may not attach smoke results to API Catalog endpoint coverage." >&2
          fi

          if postman collection run --help | rg -q -- '--report-events'; then
            run_args+=(--report-events)
          else
            echo "Installed Postman CLI does not support --report-events; CI/CD activity may remain empty until the runner CLI supports it." >&2
          fi

          postman "${run_args[@]}" 2>&1 | tee "${REPORTS_DIR}/${{ matrix.service_key }}-smoke.txt"

      - name: Run contract tests
        continue-on-error: true
        shell: bash
        env:
          POSTMAN_CI_INTEGRATION_ID: ${{ vars.POSTMAN_CI_INTEGRATION_ID }}
        run: |
          set -euo pipefail
          collection_id="${{ matrix.contract_collection_id }}"
          if [[ -z "${collection_id}" ]]; then
            collection_id="${{ steps.bootstrap.outputs.contract-collection-id }}"
          fi

          run_args=(
            collection run "${collection_id}"
            -e "${{ steps.ci_env.outputs.environment-id }}"
            --env-var "baseUrl=${{ steps.ci_env.outputs.base-url }}"
            --env-var "apiVersion=${{ matrix.version }}"
            --bail failure
            --reporters cli,junit,json
            --reporter-junit-export "${REPORTS_DIR}/${{ matrix.service_key }}-contract.junit.xml"
            --reporter-json-export "${REPORTS_DIR}/${{ matrix.service_key }}-contract.json"
          )

          if [[ -n "${POSTMAN_CI_INTEGRATION_ID:-}" ]]; then
            run_args+=(--integration-id "${POSTMAN_CI_INTEGRATION_ID}")
          else
            echo "POSTMAN_CI_INTEGRATION_ID is not set; Postman may not attach contract results to API Catalog endpoint coverage." >&2
          fi

          if postman collection run --help | rg -q -- '--report-events'; then
            run_args+=(--report-events)
          else
            echo "Installed Postman CLI does not support --report-events; CI/CD activity may remain empty until the runner CLI supports it." >&2
          fi

          postman "${run_args[@]}" 2>&1 | tee "${REPORTS_DIR}/${{ matrix.service_key }}-contract.txt"

      - name: Resolve smoke monitor
        id: smoke_monitor
        shell: bash
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
          SMOKE_COLLECTION_ID: ${{ steps.bootstrap.outputs.smoke-collection-id }}
          FALLBACK_SMOKE_COLLECTION_ID: ${{ matrix.smoke_collection_id }}
          ENVIRONMENT_ID: ${{ steps.ci_env.outputs.environment-id }}
        run: |
          set -euo pipefail

          collection_id="${SMOKE_COLLECTION_ID:-}"
          if [[ -z "${collection_id}" ]]; then
            collection_id="${FALLBACK_SMOKE_COLLECTION_ID:-}"
          fi

          monitors_response="$(curl --fail-with-body -sS -H "X-Api-Key: ${POSTMAN_API_KEY}" "https://api.getpostman.com/monitors")"

          monitor_id="$(jq -r --arg collection_uid "${collection_id}" --arg environment_uid "${ENVIRONMENT_ID}" '
            .monitors
            | map(select(.collectionUid == $collection_uid and .environmentUid == $environment_uid))
            | first
            | .id // empty
          ' <<<"${monitors_response}")"

          if [[ -z "${monitor_id}" ]]; then
            monitor_id="$(jq -r --arg collection_uid "${collection_id}" '
              .monitors
              | map(select(.collectionUid == $collection_uid))
              | first
              | .id // empty
            ' <<<"${monitors_response}")"
          fi

          echo "monitor-id=${monitor_id}" >> "${GITHUB_OUTPUT}"

      - name: Run smoke monitor
        if: ${{ steps.smoke_monitor.outputs.monitor-id != '' }}
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          postman monitor run "${{ steps.smoke_monitor.outputs.monitor-id }}" \
            --timeout 900000 \
            2>&1 | tee "${REPORTS_DIR}/${{ matrix.service_key }}-monitor.txt"

      - name: Resolve primary Insights environment
        if: ${{ matrix.enable_insights }}
        id: insights_env
        shell: bash
        env:
          ENVIRONMENT_UIDS_JSON: ${{ steps.repo_sync.outputs.environment-uids-json }}
          ENVIRONMENTS_JSON: ${{ toJSON(matrix.environments) }}
          SYSTEM_ENV_MAP_JSON: ${{ toJSON(matrix.system_env_map) }}
        run: |
          set -euo pipefail

          primary_env="$(jq -r 'keys[0] // empty' <<<"${SYSTEM_ENV_MAP_JSON}")"
          if [[ -z "${primary_env}" ]]; then
            primary_env="$(jq -r '.[0] // empty' <<<"${ENVIRONMENTS_JSON}")"
          fi
          if [[ -z "${primary_env}" ]]; then
            echo "No environments configured for Insights onboarding." >&2
            exit 1
          fi

          environment_id="$(jq -r --arg key "${primary_env}" '.[$key] // empty' <<<"${ENVIRONMENT_UIDS_JSON}")"
          system_environment_id="$(jq -r --arg key "${primary_env}" '.[$key] // empty' <<<"${SYSTEM_ENV_MAP_JSON}")"

          if [[ -z "${environment_id}" ]]; then
            echo "Missing Postman environment UID for ${primary_env}." >&2
            exit 1
          fi

          if [[ -z "${system_environment_id}" ]]; then
            echo "Missing system environment ID for ${primary_env}." >&2
            exit 1
          fi

          echo "primary-env=${primary_env}" >> "${GITHUB_OUTPUT}"
          echo "environment-id=${environment_id}" >> "${GITHUB_OUTPUT}"
          echo "system-environment-id=${system_environment_id}" >> "${GITHUB_OUTPUT}"

      - name: Onboard API Catalog service to Insights
        if: ${{ matrix.enable_insights }}
        id: insights_onboarding
        shell: bash
        env:
          POSTMAN_ACCESS_TOKEN: ${{ secrets.POSTMAN_ACCESS_TOKEN }}
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
          POSTMAN_TEAM_ID: ${{ vars.POSTMAN_TEAM_ID }}
          WORKSPACE_ID: ${{ steps.bootstrap.outputs.workspace-id }}
          SYSTEM_ENVIRONMENT_ID: ${{ steps.insights_env.outputs.system-environment-id }}
          SERVICE_KEY: ${{ matrix.service_key }}
        run: |
          set -euo pipefail

          if [[ -z "${POSTMAN_ACCESS_TOKEN}" ]]; then
            echo "POSTMAN_ACCESS_TOKEN is required for Insights onboarding." >&2
            exit 1
          fi

          headers=(
            -H "content-type: application/json"
            -H "x-access-token: ${POSTMAN_ACCESS_TOKEN}"
          )

          if [[ -n "${POSTMAN_TEAM_ID:-}" ]]; then
            headers+=(-H "x-entity-team-id: ${POSTMAN_TEAM_ID}")
          fi

          application_response="$(
            curl --fail-with-body -sS \
              -X POST \
              -H "x-api-key: ${POSTMAN_API_KEY}" \
              -H "x-postman-env: production" \
              -H "Content-Type: application/json" \
              -d "{\"system_env\":\"${SYSTEM_ENVIRONMENT_ID}\"}" \
              "https://api.observability.postman.com/v2/agent/api-catalog/workspaces/${WORKSPACE_ID}/applications"
          )"

          provider_service_id="$(jq -r '.service_id // empty' <<<"${application_response}")"
          application_id="$(jq -r '.application_id // empty' <<<"${application_response}")"

          if [[ -z "${provider_service_id}" ]]; then
            echo "Unable to resolve Insights provider service id for ${SERVICE_KEY}." >&2
            echo "${application_response}" >&2
            exit 1
          fi

          echo "Binding response: ${application_response}"

          onboard_request="$(
            jq -nc \
              --arg sid "${provider_service_id}" \
              --arg wid "${WORKSPACE_ID}" \
              --arg sys "${SYSTEM_ENVIRONMENT_ID}" \
              '{service:"akita", method:"POST", path:"/v2/api-catalog/services/onboard", body:{services:[{service_id:$sid, workspace_id:$wid, system_env:$sys}]}}'
          )"

          curl --fail-with-body -sS \
            "https://bifrost-premium-https-v4.gw.postman.com/ws/proxy" \
            "${headers[@]}" \
            --data "${onboard_request}" \
            | jq -c .

          acknowledge_request="$(
            jq -nc \
              --arg wid "${WORKSPACE_ID}" \
              '{service:"akita", method:"POST", path:("/v2/workspaces/" + $wid + "/onboarding/acknowledge"), body:{}}'
          )"

          curl --fail-with-body -sS \
            "https://bifrost-premium-https-v4.gw.postman.com/ws/proxy" \
            "${headers[@]}" \
            --data "${acknowledge_request}" \
            | jq -c .

          echo "application-id=${application_id}" >> "${GITHUB_OUTPUT}"
          echo "provider-service-id=${provider_service_id}" >> "${GITHUB_OUTPUT}"
          echo "status=success" >> "${GITHUB_OUTPUT}"

      - name: Render Insights runtime bundle
        id: runtime_bundle
        shell: bash
        run: |
          mkdir -p "${REPORTS_DIR}/runtime/${{ matrix.service_key }}"
          node scripts/render-runtime-bundle.mjs \
            --service "${{ matrix.service_key }}" \
            --workspace-id "${{ steps.bootstrap.outputs.workspace-id }}" \
            --system-env-map '${{ toJSON(matrix.system_env_map) }}' \
            --cluster-name "${{ matrix.cluster_name }}" \
            --insights-project-id "${{ steps.insights_onboarding.outputs.provider-service-id || matrix.insights_project_id }}" \
            --insights-application-id "${{ steps.insights_onboarding.outputs.application-id || matrix.insights_application_id }}" \
            --output-dir "${REPORTS_DIR}/runtime/${{ matrix.service_key }}"

      - name: Persist Insights project ids
        if: ${{ matrix.enable_insights && github.event_name != 'pull_request' && steps.insights_onboarding.outputs.provider-service-id != '' }}
        shell: bash
        env:
          SERVICE_KEY: ${{ matrix.service_key }}
          INSIGHTS_PROJECT_ID: ${{ steps.insights_onboarding.outputs.provider-service-id }}
          INSIGHTS_APPLICATION_ID: ${{ steps.insights_onboarding.outputs.application-id }}
        run: |
          set -euo pipefail

          tmp_manifest="$(mktemp)"

          jq \
            --arg key "${SERVICE_KEY}" \
            --arg project "${INSIGHTS_PROJECT_ID}" \
            --arg application "${INSIGHTS_APPLICATION_ID}" \
            '
            .services |= map(
              if .service_key == $key then
                . + {
                  insights_project_id: $project,
                  insights_application_id: $application
                }
              else
                .
              end
            )
            ' "${MANIFEST_PATH}" > "${tmp_manifest}"

          if cmp -s "${MANIFEST_PATH}" "${tmp_manifest}"; then
            rm -f "${tmp_manifest}"
            exit 0
          fi

          mv "${tmp_manifest}" "${MANIFEST_PATH}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${MANIFEST_PATH}"
          git commit -m "Persist Insights project id for ${SERVICE_KEY}"
          git push

      - name: Upload Postman reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: postman-${{ matrix.service_key }}-reports
          path: ${{ env.REPORTS_DIR }}
          if-no-files-found: ignore

      - name: Write job summary
        if: always()
        shell: bash
        run: |
          {
            echo "### ${{ matrix.service_name }}"
            echo ""
            echo "- Service key: \`${{ matrix.service_key }}\`"
            echo "- Workspace ID: \`${{ steps.bootstrap.outputs.workspace-id }}\`"
            echo "- Spec ID: \`${{ steps.bootstrap.outputs.spec-id }}\`"
            echo "- Baseline collection ID: \`${{ steps.bootstrap.outputs.baseline-collection-id }}\`"
            echo "- Smoke collection ID: \`${{ steps.bootstrap.outputs.smoke-collection-id }}\`"
            echo "- Contract collection ID: \`${{ steps.bootstrap.outputs.contract-collection-id }}\`"
            echo "- Workspace link status: \`${{ steps.repo_sync.outputs.workspace-link-status }}\`"
            echo "- Environment sync status: \`${{ steps.repo_sync.outputs.environment-sync-status }}\`"
            echo "- CI environment: \`${{ steps.ci_env.outputs.environment-name || 'n/a' }}\`"
            echo "- CI base URL: \`${{ steps.ci_env.outputs.base-url || 'n/a' }}\`"
            echo "- Smoke monitor ID: \`${{ steps.smoke_monitor.outputs.monitor-id || 'n/a' }}\`"
            echo "- Insights onboarding status: \`${{ steps.insights_onboarding.outputs.status || 'skipped' }}\`"
            echo "- Insights application ID: \`${{ steps.insights_onboarding.outputs.application-id || 'n/a' }}\`"
            echo "- Repo sync commit: \`${{ steps.repo_sync.outputs.commit-sha }}\`"
            echo "- Runtime bundle: \`reports/runtime/${{ matrix.service_key }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
