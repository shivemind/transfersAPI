type: http
name: Initiate a fund transfer
url: '{{baseUrl}}/transfers'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "fromAccountId": "string",
      "toAccountId": "string",
      "amount": 3744.557675644613,
      "currency": "string",
      "reference": "string"
    }
scripts:
  - type: afterResponse
    code:
      - // [Smoke] Auto-generated test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
    language: text/javascript
examples:
  - response:
      statusCode: 201
      statusText: Created
      body:
        type: json
        content: |-
          {
            "id": "d1063412-1fc9-a306-cb64-803c7f5a9e1d",
            "fromAccountId": "string",
            "toAccountId": "string",
            "amount": 7130.437372779174,
            "currency": "string",
            "status": "pending",
            "reference": "string",
            "createdAt": "1980-03-05T22:38:44.893Z",
            "completedAt": "2008-02-29T19:32:44.319Z"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Created
  - response:
      statusCode: 400
      statusText: Bad Request
      body:
        type: json
        content: |-
          {
            "error": "string",
            "message": "string",
            "statusCode": 9099
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Validation error
  - response:
      statusCode: 500
      statusText: Internal Server Error
      body:
        type: json
        content: |-
          {
            "error": "string",
            "message": "string",
            "statusCode": 9099
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Internal server error
