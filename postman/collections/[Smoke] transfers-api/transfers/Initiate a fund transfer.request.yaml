type: http
name: Initiate a fund transfer
url: '{{baseUrl}}/transfers'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "fromAccountId": "string",
      "toAccountId": "string",
      "amount": 4177.698398910084,
      "currency": "string",
      "reference": "string"
    }
scripts:
  - type: afterResponse
    code:
      - // [Smoke] Auto-generated test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
    language: text/javascript
examples:
  - response:
      statusCode: 201
      statusText: Created
      body:
        type: json
        content: |-
          {
            "id": "ce300763-aac9-4c34-33f9-abced2aa8c8d",
            "fromAccountId": "string",
            "toAccountId": "string",
            "amount": 2884.4581640315805,
            "currency": "string",
            "status": "pending",
            "reference": "string",
            "createdAt": "2012-09-07T01:41:07.040Z",
            "completedAt": "1952-01-25T23:33:23.193Z"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Created
  - response:
      statusCode: 400
      statusText: Bad Request
      body:
        type: json
        content: |-
          {
            "error": "string",
            "message": "string",
            "statusCode": 2151
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Validation error
  - response:
      statusCode: 500
      statusText: Internal Server Error
      body:
        type: json
        content: |-
          {
            "error": "string",
            "message": "string",
            "statusCode": 2151
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Internal server error
