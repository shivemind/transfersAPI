type: http
name: Initiate a fund transfer
url: '{{baseUrl}}/transfers'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "fromAccountId": "string",
      "toAccountId": "string",
      "amount": 4178.36351334415,
      "currency": "string",
      "reference": "string"
    }
scripts:
  - type: afterResponse
    code:
      - // [Smoke] Auto-generated test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
    language: text/javascript
examples:
  - response:
      statusCode: 201
      statusText: Created
      body:
        type: json
        content: |-
          {
            "id": "a954d436-30b4-86bd-66f6-3cbf15225ea3",
            "fromAccountId": "string",
            "toAccountId": "string",
            "amount": 1262.180588121673,
            "currency": "string",
            "status": "failed",
            "reference": "string",
            "createdAt": "1951-05-25T09:22:41.681Z",
            "completedAt": "1990-12-22T04:50:41.329Z"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Created
  - response:
      statusCode: 400
      statusText: Bad Request
      body:
        type: json
        content: |-
          {
            "error": "string",
            "message": "string",
            "statusCode": 8190
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Validation error
  - response:
      statusCode: 500
      statusText: Internal Server Error
      body:
        type: json
        content: |-
          {
            "error": "string",
            "message": "string",
            "statusCode": 8190
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Internal server error
