type: http
name: Cancel a pending transfer
url: '{{baseUrl}}/transfers/:transferId/cancel'
method: POST
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: transferId
    value: 2e8cc1d5-ad2d-b84c-cc19-cad08bf622f4
scripts:
  - type: afterResponse
    code:
      - // [Smoke] Auto-generated test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
    language: text/javascript
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "id": "d0e4724a-f155-4d98-01f8-ac2a586d33f9",
            "fromAccountId": "string",
            "toAccountId": "string",
            "amount": 1715.1669523136582,
            "currency": "string",
            "status": "failed",
            "reference": "string",
            "createdAt": "2013-09-04T15:49:58.170Z",
            "completedAt": "1971-03-04T10:47:01.105Z"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Transfer cancelled
  - response:
      statusCode: 409
      statusText: Conflict
      body:
        type: json
        content: |-
          {
            "error": "string",
            "message": "string",
            "statusCode": 3149
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Transfer cannot be cancelled
  - response:
      statusCode: 500
      statusText: Internal Server Error
      body:
        type: json
        content: |-
          {
            "error": "string",
            "message": "string",
            "statusCode": 3149
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Internal server error
