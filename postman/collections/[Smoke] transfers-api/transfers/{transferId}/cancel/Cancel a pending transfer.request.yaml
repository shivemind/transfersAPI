type: http
name: Cancel a pending transfer
url: '{{baseUrl}}/transfers/:transferId/cancel'
method: POST
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: transferId
    value: 11e8480c-9e03-fd3f-2abc-4e7473e630b3
scripts:
  - type: afterResponse
    code:
      - // [Smoke] Auto-generated test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
    language: text/javascript
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "id": "d1063412-1fc9-a306-cb64-803c7f5a9e1d",
            "fromAccountId": "string",
            "toAccountId": "string",
            "amount": 7130.437372779174,
            "currency": "string",
            "status": "pending",
            "reference": "string",
            "createdAt": "1980-03-05T22:38:44.893Z",
            "completedAt": "2008-02-29T19:32:44.319Z"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Transfer cancelled
  - response:
      statusCode: 409
      statusText: Conflict
      body:
        type: json
        content: |-
          {
            "error": "string",
            "message": "string",
            "statusCode": 9099
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Transfer cannot be cancelled
  - response:
      statusCode: 500
      statusText: Internal Server Error
      body:
        type: json
        content: |-
          {
            "error": "string",
            "message": "string",
            "statusCode": 9099
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Internal server error
