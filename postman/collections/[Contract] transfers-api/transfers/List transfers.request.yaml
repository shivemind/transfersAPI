type: http
name: List transfers
url: '{{baseUrl}}/transfers?status=cancelled&limit=20'
method: GET
headers:
  - key: Accept
    value: application/json
queryParams:
  - key: status
    value: cancelled
  - key: limit
    value: '20'
scripts:
