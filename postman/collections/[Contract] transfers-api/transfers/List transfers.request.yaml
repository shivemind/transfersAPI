type: http
name: List transfers
url: '{{baseUrl}}/transfers?status=pending&limit=20'
method: GET
headers:
  - key: Accept
    value: application/json
queryParams:
  - key: status
    value: pending
  - key: limit
    value: '20'
scripts:
  - type: afterResponse
    code:
      - // [Contract] Auto-generated contract test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
