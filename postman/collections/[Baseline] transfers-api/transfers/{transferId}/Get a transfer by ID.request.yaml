type: http
name: Get a transfer by ID
url: '{{baseUrl}}/transfers/:transferId'
method: GET
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: transferId
    value: 87ab87e2-af32-c764-34a9-02280963355a
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "id": "9647cb49-dde3-6a75-dfab-626750acbc81",
            "fromAccountId": "string",
            "toAccountId": "string",
            "amount": 2153.3943998656046,
            "currency": "string",
            "status": "pending",
            "reference": "string",
            "createdAt": "1966-11-02T21:41:24.991Z",
            "completedAt": "2019-10-08T13:17:41.944Z"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: OK
  - response:
      statusCode: 404
      statusText: Not Found
      body:
        type: json
        content: |-
          {
            "error": "string",
            "message": "string",
            "statusCode": 8091
          }
