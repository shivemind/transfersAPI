    value: application/json
pathVariables:
  - key: transferId
    value: 385ca352-eb0e-844d-e47b-1f4f1eca4fd8
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "id": "104c0487-d585-7289-082c-5c5bc72961cf",
            "fromAccountId": "string",
            "toAccountId": "string",
            "amount": 6720.521728024338,
            "currency": "string",
            "status": "pending",
            "reference": "string",
            "createdAt": "1953-03-22T01:29:53.146Z",
            "completedAt": "1959-08-18T14:25:24.613Z"
          }
