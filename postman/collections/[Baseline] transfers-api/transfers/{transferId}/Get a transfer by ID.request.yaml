type: http
name: Get a transfer by ID
url: '{{baseUrl}}/transfers/:transferId'
method: GET
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: transferId
    value: c9b21a63-cae5-7c72-33b9-9dfd078fa8f4
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "id": "50615b0b-e2be-2056-9ad6-5d11c45ee705",
            "fromAccountId": "string",
            "toAccountId": "string",
            "amount": 7083.002422179791,
            "currency": "string",
            "status": "pending",
            "reference": "string",
            "createdAt": "2009-05-24T16:52:30.799Z",
            "completedAt": "2005-09-18T11:03:28.422Z"
