type: http
name: Cancel a pending transfer
url: '{{baseUrl}}/transfers/:transferId/cancel'
method: POST
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: transferId
    value: 48be652d-b2e9-c087-e823-eb8ebee1234f
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "id": "427744c0-9e6e-583b-fe9e-41e65e061bbc",
            "fromAccountId": "string",
            "toAccountId": "string",
            "amount": 3291.9895039682333,
            "currency": "string",
            "status": "pending",
            "reference": "string",
            "createdAt": "2008-10-24T18:57:59.634Z",
            "completedAt": "2002-04-08T06:26:52.098Z"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Transfer cancelled
  - response:
      statusCode: 409
      statusText: Conflict
      body:
        type: json
        content: |-
          {
            "error": "string",
            "message": "string",
            "statusCode": 8029
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Transfer cannot be cancelled
  - response:
      statusCode: 500
      statusText: Internal Server Error
      body:
        type: json
        content: |-
          {
            "error": "string",
            "message": "string",
            "statusCode": 8029
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Internal server error
