type: http
name: Cancel a pending transfer
url: '{{baseUrl}}/transfers/:transferId/cancel'
method: POST
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: transferId
    value: 2d633394-4c45-3b9c-3b94-8eb422c6a588
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "id": "459a421f-faed-64a7-44b2-d18d506b013b",
            "fromAccountId": "string",
            "toAccountId": "string",
            "amount": 3195.2464559886075,
            "currency": "string",
            "status": "failed",
            "reference": "string",
            "createdAt": "1994-04-06T12:32:36.439Z",
            "completedAt": "1987-12-05T02:12:26.768Z"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Transfer cancelled
  - response:
      statusCode: 409
      statusText: Conflict
      body:
        type: json
        content: |-
          {
            "error": "string",
            "message": "string",
            "statusCode": 8610
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Transfer cannot be cancelled
  - response:
      statusCode: 500
      statusText: Internal Server Error
      body:
        type: json
        content: |-
          {
            "error": "string",
            "message": "string",
            "statusCode": 8610
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Internal server error
