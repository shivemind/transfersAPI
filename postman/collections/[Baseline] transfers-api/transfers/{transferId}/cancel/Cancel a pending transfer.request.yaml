type: http
name: Cancel a pending transfer
url: '{{baseUrl}}/transfers/:transferId/cancel'
method: POST
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: transferId
    value: 248986d0-e2bc-1e0b-4553-9fac6d5e50f2
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "id": "9e82166e-2f6f-46fc-a4a4-268beef70b38",
            "fromAccountId": "string",
            "toAccountId": "string",
            "amount": 5820.954644173937,
            "currency": "string",
            "status": "completed",
            "reference": "string",
            "createdAt": "2014-08-02T06:46:05.697Z",
            "completedAt": "1950-11-20T03:03:09.738Z"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Transfer cancelled
  - response:
      statusCode: 409
      statusText: Conflict
      body:
        type: json
        content: |-
          {
            "error": "string",
            "message": "string",
            "statusCode": 2286
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Transfer cannot be cancelled
  - response:
      statusCode: 500
      statusText: Internal Server Error
      body:
        type: json
        content: |-
          {
            "error": "string",
            "message": "string",
            "statusCode": 2286
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Internal server error
