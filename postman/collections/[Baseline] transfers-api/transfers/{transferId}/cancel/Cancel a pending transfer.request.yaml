type: http
name: Cancel a pending transfer
url: '{{baseUrl}}/transfers/:transferId/cancel'
method: POST
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: transferId
    value: c4e74f6c-64e6-97f0-61e0-138792380dcc
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "id": "83c4eff9-5740-e961-06fe-4cc1d99ceee2",
            "fromAccountId": "string",
            "toAccountId": "string",
            "amount": 3793.9148390605305,
            "currency": "string",
            "status": "pending",
            "reference": "string",
            "createdAt": "1957-03-11T12:05:02.579Z",
            "completedAt": "1953-09-11T02:16:06.625Z"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Transfer cancelled
  - response:
      statusCode: 409
      statusText: Conflict
      body:
        type: json
        content: |-
          {
            "error": "string",
            "message": "string",
            "statusCode": 2104
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Transfer cannot be cancelled
  - response:
      statusCode: 500
      statusText: Internal Server Error
      body:
        type: json
        content: |-
          {
            "error": "string",
            "message": "string",
            "statusCode": 2104
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Internal server error
