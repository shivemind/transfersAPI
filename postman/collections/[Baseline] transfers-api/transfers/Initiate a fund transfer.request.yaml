type: http
name: Initiate a fund transfer
url: '{{baseUrl}}/transfers'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "fromAccountId": "string",
      "toAccountId": "string",
      "amount": 5980.710259335578,
      "currency": "string",
      "reference": "string"
    }
